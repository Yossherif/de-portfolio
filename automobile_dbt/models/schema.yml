version: 2

models:
  - name: stg_automobile
    description: "Cleaned and cast automobile data from the raw source"
    columns:
      - name: make
        description: "Car manufacturer"
        tests:
          - not_null
      - name: price
        description: "Car price in USD"
        tests:
          - not_null
      - name: fuel_type
        description: "Type of fuel"
        tests:
          - not_null
          - accepted_values:
              arguments:
              values: ['gas', 'diesel']

  - name: mart_automobile_summary
    description: "Enriched automobile data with price tiers and efficiency ratings"
    columns:
      - name: price_tier
        description: "Price segment based on car price"
        tests:
          - not_null
          - accepted_values:
              values: ['Budget', 'Mid-Range', 'Premium']
      - name: efficiency_rating
        description: "Fuel efficiency category"
        tests:
          - not_null
          - accepted_values:
              values: ['Low', 'Medium', 'High']